name: Release Build

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            sidecar_arch: x86_64
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    env:
      UV_LINK_MODE: copy
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libsqlite3-dev \
            patchelf

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: '3.11'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Python dependencies
        run: uv sync --frozen --group build

      - name: Build Python sidecar
        shell: bash
        run: |
          if [ "${{ matrix.sidecar_arch || '' }}" = "x86_64" ]; then
            arch -x86_64 pnpm build:daemon
          else
            pnpm build:daemon
          fi

      - name: Verify sidecar binary
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "windows-latest" ]; then
            test -f src-tauri/resources/sidecar/tauri-py-daemon.exe
          else
            test -f src-tauri/resources/sidecar/tauri-py-daemon
          fi

      - name: Use prebuilt sidecar for Tauri packaging
        shell: bash
        run: |
          node <<'EOF'
          const fs = require('fs');
          const path = 'src-tauri/tauri.conf.json';
          const config = JSON.parse(fs.readFileSync(path, 'utf8'));
          config.build.beforeBuildCommand = 'pnpm build:ui';
          fs.writeFileSync(path, `${JSON.stringify(config, null, 2)}\n`);
          EOF

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: tauri_py ${{ github.ref_name }}
          releaseBody: See the assets to download and install this version.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
